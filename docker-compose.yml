version: "3.9"

services:
  backend:
    build: .

    container_name: if

    ports:
      - "5000:5000"

    env_file:
      - .env

    restart: unless-stopped
  
  db:
    image: postgres:17-alpine
    container_name: if_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: identityforge
    volumes:
      # This is the "safe" part: it persists your data on your host machine
      # so if the container dies, your data survives.
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: if_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata: